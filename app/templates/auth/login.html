{% extends "base.html" %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card mt-5">
                <div class="card-header bg-primary text-white text-center">
                    <h4>Gen 79A Appraisal System</h4>
                    <h5>Login</h5>
                </div>
                <div class="card-body">
                    {% with messages = get_flashed_messages(with_categories=true) %}
                        {% if messages %}
                            {% for category, message in messages %}
                                <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                                    {{ message }}
                                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                                </div>
                            {% endfor %}
                        {% endif %}
                    {% endwith %}
                    
                    <form method="POST" action="{{ url_for('auth.login') }}" id="loginForm">
                        <div class="mb-3">
                            <label for="username" class="form-label">Username</label>
                            <input type="text" class="form-control" id="username" name="username" required autofocus>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" class="form-control" id="password" name="password" required>
                        </div>
                        <div class="mb-3 form-check">
                            <input type="checkbox" class="form-check-input" id="remember" name="remember">
                            <label class="form-check-label" for="remember">Remember Me</label>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Login</button>
                    </form>
                    
                    <hr>
                    
                    <div class="text-center">
                        <h6>Quick Login Options:</h6>
                        <div class="row g-2 mt-2">
                            <div class="col-md-6">
                                <button type="button" onclick="quickLogin('admin', 'admin123')" class="btn btn-danger w-100">
                                    <i class="fas fa-user-shield"></i> Admin Login
                                </button>
                            </div>
                            <div class="col-md-6">
                                <button type="button" onclick="quickLogin('reporting_officer', 'password123')" class="btn btn-warning w-100">
                                    <i class="fas fa-user-tie"></i> Reporting Officer
                                </button>
                            </div>
                            <div class="col-md-6">
                                <button type="button" onclick="quickLogin('countersigning_officer', 'password123')" class="btn btn-success w-100">
                                    <i class="fas fa-user-check"></i> Countersigning Officer
                                </button>
                            </div>
                            <div class="col-md-6">
                                <button type="button" onclick="quickLogin('hr_officer', 'password123')" class="btn btn-info w-100">
                                    <i class="fas fa-users"></i> HR Officer
                                </button>
                            </div>
                            <div class="col-md-6">
                                <button type="button" onclick="quickLogin('john_doe', 'password123')" class="btn btn-primary w-100">
                                    <i class="fas fa-user"></i> John Doe
                                </button>
                            </div>
                            <div class="col-md-6">
                                <button type="button" onclick="quickLogin('jane_smith', 'password123')" class="btn btn-primary w-100">
                                    <i class="fas fa-user"></i> Jane Smith
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
function quickLogin(username, password) {
    document.getElementById('username').value = username;
    document.getElementById('password').value = password;
    document.getElementById('loginForm').submit();
}
</script>
{% endblock %}
