{% extends "base.html" %} 
{% block content %} 
<div class="container"> 
    <h2>Admin API Test</h2> 
    <button class="btn btn-primary" onclick="testSeed()">Test Seed Users API</button> 
    <div id="result" class="mt-3"></div> 
</div> 
<script> 
function testSeed() { 
    fetch('/admin/seed-users', { 
        method: 'POST', 
        headers: { 
            'Content-Type': 'application/json', 
        } 
    }) 
    .then(response =
    .then(data =
        document.getElementById('result').innerHTML = '<div class="alert alert-info">' + data.message + '</div>'; 
    }) 
    .catch(error =
        document.getElementById('result').innerHTML = '<div class="alert alert-danger">Error: ' + error + '</div>'; 
    }); 
} 
</script> 
{% endblock %}
