{% extends "base.html" %}

{% block content %}
<div class="container">
    <div class="row">
        <div class="col-12">
            <div class="card">
                <div class="card-header bg-primary text-white">
                    <h4><i class="fas fa-user-edit"></i> Edit Officer Profile</h4>
                    <small>Editing Officer ID: {{ officer.id }}</small>
                </div>
                <div class="card-body">
                    <form method="POST">
                        <div class="row">
                            <div class="col-md-3 mb-3">
                                <label class="form-label">Title</label>
                                <select name="title" class="form-control">
                                    <option value="">Select Title</option>
                                    <option value="Mr" {% if officer.title == "Mr" %}selected{% endif %}>Mr</option>
                                    <option value="Mrs" {% if officer.title == "Mrs" %}selected{% endif %}>Mrs</option>
                                    <option value="Miss" {% if officer.title == "Miss" %}selected{% endif %}>Miss</option>
                                    <option value="Dr" {% if officer.title == "Dr" %}selected{% endif %}>Dr</option>
                                    <option value="Chief" {% if officer.title == "Chief" %}selected{% endif %}>Chief</option>
                                </select>
                            </div>
                            <div class="col-md-3 mb-3">
                                <label class="form-label">Staff Number</label>
                                <input type="text" name="staff_no" class="form-control" value="{{ officer.staff_no or '' }}">
                            </div>
                            <div class="col-md-3 mb-3">
                                <label class="form-label">Surname *</label>
                                <input type="text" name="surname" class="form-control" value="{{ officer.surname or '' }}" required>
                            </div>
                            <div class="col-md-3 mb-3">
                                <label class="form-label">First Name *</label>
                                <input type="text" name="first_name" class="form-control" value="{{ officer.first_name or '' }}" required>
                            </div>
                        </div>
                        
                        <div class="row">
                            <div class="col-md-4 mb-3">
                                <label class="form-label">Other Names</label>
                                <input type="text" name="other_names" class="form-control" value="{{ officer.other_names or '' }}">
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label">Date of Birth</label>
                                <input type="date" name="date_of_birth" class="form-control" value="{{ officer.date_of_birth.strftime('%Y-%m-%d') if officer.date_of_birth else '' }}">
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label">Date First Appointment</label>
                                <input type="date" name="date_first_appointment" class="form-control" value="{{ officer.date_first_appointment.strftime('%Y-%m-%d') if officer.date_first_appointment else '' }}">
                            </div>
                        </div>
                        
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Post Appointed To</label>
                                <input type="text" name="post_appointed" class="form-control" value="{{ officer.post_appointed or '' }}">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Present Post</label>
                                <input type="text" name="present_post" class="form-control" value="{{ officer.present_post or '' }}">
                            </div>
                        </div>
                        
                        <div class="row">
                            <div class="col-md-4 mb-3">
                                <label class="form-label">Salary Grade</label>
                                <input type="text" name="salary_grade" class="form-control" value="{{ officer.salary_grade or '' }}">
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label">Ministry (MDA)</label>
                                <input type="text" name="ministry" class="form-control" value="{{ officer.ministry or '' }}">
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label">Department</label>
                                <input type="text" name="department" class="form-control" value="{{ officer.department or '' }}">
                            </div>
                        </div>
                        
                        <div class="row">
                            <div class="col-md-4 mb-3">
                                <label class="form-label">Division</label>
                                <input type="text" name="division" class="form-control" value="{{ officer.division or '' }}">
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label">Branch</label>
                                <input type="text" name="branch" class="form-control" value="{{ officer.branch or '' }}">
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label">Section/Unit</label>
                                <input type="text" name="section" class="form-control" value="{{ officer.section or '' }}">
                            </div>
                        </div>
                        
                        <div class="mt-4">
                            <button type="submit" class="btn btn-primary">Save Profile</button>
                            <a href="{{ url_for('admin.manage_officers') }}" class="btn btn-secondary">Back to Officers List</a>
                            <a href="{{ url_for('reports.dashboard') }}" class="btn btn-info float-end">Go to Dashboard</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
