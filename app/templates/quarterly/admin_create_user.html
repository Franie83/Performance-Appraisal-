{% extends "base.html" %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header bg-dark text-white">
                    <h4><i class="fas fa-user-plus"></i> Create New User</h4>
                </div>
                <div class="card-body">
                    <form method="POST">
                        <div class="mb-3">
                            <label>Username *</label>
                            <input type="text" name="username" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label>Email *</label>
                            <input type="email" name="email" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label>Password *</label>
                            <input type="password" name="password" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label>Role *</label>
                            <select name="role" class="form-select" required>
                                <option value="OFFICER">Officer</option>
                                <option value="REPORTING_OFFICER">Reporting Officer</option>
                                <option value="COUNTERSIGNING_OFFICER">Countersigning Officer</option>
                                <option value="PERMANENT_SECRETARY">Permanent Secretary</option>
                                <option value="HR">HR Officer</option>
                                <option value="ADMIN">Administrator</option>
                            </select>
                        </div>
                        <div class="text-center">
                            <button type="submit" class="btn btn-success">Create User</button>
                            <a href="{{ url_for('quarterly.admin_manage_users') }}" class="btn btn-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
