{% extends "base.html" %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header bg-warning">
                    <h4><i class="fas fa-check-circle"></i> Review Goal</h4>
                    <small>Officer: {{ goal.user.full_name or goal.user.username }}</small>
                </div>
                <div class="card-body">
                    <div class="alert alert-info">
                        <strong>Goal:</strong> {{ goal.goal_description }}<br>
                        <strong>Quarter:</strong> Q{{ goal.quarter }}<br>
                        <strong>Priority:</strong> {{ goal.priority }}<br>
                        <strong>Success Criteria:</strong> {{ goal.success_criteria or 'Not specified' }}
                    </div>
                    
                    <form method="POST">
                        <div class="mb-3">
                            <label class="form-label">Modifications (if any)</label>
                            <textarea name="modifications" class="form-control" rows="4" 
                                placeholder="If modifications are needed, specify them here..."></textarea>
                        </div>
                        
                        <div class="text-center">
                            <button type="submit" name="action" value="approve" class="btn btn-success">
                                <i class="fas fa-check"></i> Approve Goal
                            </button>
                            <button type="submit" name="action" value="modify" class="btn btn-warning">
                                <i class="fas fa-edit"></i> Request Modifications
                            </button>
                            <a href="{{ url_for('quarterly.dashboard') }}" class="btn btn-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
